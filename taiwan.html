            display: flex;
            align-items: center;
            gap: 0.8rem;
            max-width: 400px;
            margin: 1.5rem auto;

            color: white;

            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 2rem;

            border: none;
            padding: 0.6rem 1.2rem;

            color: #cbd5e1;
            font-weight: 500;
            cursor: pointer;

            background: #ffd966;
            color: #1e2a3a;
        }

            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1rem;
        }

            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid rgba(255, 215, 0, 0.2);
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;

        }

        }

            color: #ffd966;

            margin: 0.3rem 0;
        }

            color: #e2e8f0;
            margin-top: 0.5rem;

            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;

            color: #ffd966;
            font-size: 1.2rem;
            margin-left: 0.5rem;
        }

            background: #ffd966;
            color: #1e2a3a;

        }

            padding: 3rem;
            color: #9bb3d0;

    let activeCategory = "all";
    let searchTerm = "";
    let selectedVoice = null;
    const voiceStatusDiv = document.getElementById("voiceStatus");

    // Fungsi untuk memuat voice Mandarin
    function initVoices() {
        window.speechSynthesis.onvoiceschanged = () => {
            const voices = window.speechSynthesis.getVoices();
            selectedVoice = voices.find(voice => voice.lang === 'zh-TW') ||
                            voices.find(voice => voice.lang === 'zh-CN') ||
                            voices.find(voice => voice.lang.startsWith('zh')) ||
                            voices.find(voice => voice.lang.includes('Chinese'));
            if (selectedVoice) {
                voiceStatusDiv.innerHTML = `<i class="fas fa-check-circle"></i> Suara siap: ${selectedVoice.name} (${selectedVoice.lang})`;
            } else {
                voiceStatusDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Tidak ditemukan suara Mandarin. Browser mungkin tidak mendukung suara bahasa ini.`;
            }
        };
        // Jika sudah ada voice, panggil sekali
        if (window.speechSynthesis.getVoices().length) {
            window.speechSynthesis.onvoiceschanged();
        }
    }

    // Fungsi untuk memainkan suara
    function speak(text) {
        if (!window.speechSynthesis) {
            alert("Browser Anda tidak mendukung speech synthesis.");
            return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-TW';
        if (selectedVoice) utterance.voice = selectedVoice;
        utterance.rate = 0.9;
        utterance.pitch = 1;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
    }

    // Render kosakata
    function renderVocab() {
        let filtered = vocabulary.filter(item => {
            const matchCat = activeCategory === "all" || item.category === activeCategory;
            const matchSearch = searchTerm === "" ||
                item.chinese.includes(searchTerm) ||
                item.pinyin.toLowerCase().includes(searchTerm.toLowerCase()) ||
                item.meaning.toLowerCase().includes(searchTerm.toLowerCase());
            return matchCat && matchSearch;
        });

        if (filtered.length === 0) {
            vocabContainer.innerHTML = `<div class="no-result"><i class="fas fa-frown"></i> Tidak ada kosakata yang cocok</div>`;
            return;
        }

        vocabContainer.innerHTML = filtered.map(item => `
            <div class="vocab-card">
                <div class="vocab-info">
                    <div class="vocab-chinese">${item.chinese}</div>
                    <div class="vocab-pinyin">${item.pinyin}</div>
                    <div class="vocab-meaning">${item.meaning}</div>
                </div>
                <button class="audio-btn" onclick="speak('${item.chinese.replace(/'/g, "\\'")}')" title="Dengar suara">
                    <i class="fas fa-volume-up"></i>
                </button>
            </div>
        `).join('');
    }

    function setActiveTab(cat) {
        activeCategory = cat;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            if (btn.dataset.cat === cat) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        renderVocab();
    }

    // Event listeners
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => setActiveTab(btn.dataset.cat));
    });

    const searchInput = document.getElementById("searchInput");
    searchInput.addEventListener('input', (e) => {
        searchTerm = e.target.value.trim();
        renderVocab();
    });

    // Inisialisasi
    initVoices();
    renderVocab();

    // Pastikan voice terdeteksi setelah load
    window.addEventListener('load', () => {
        setTimeout(() => {
            if (!selectedVoice) initVoices();
        }, 500);
    });
</script>
