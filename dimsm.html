<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kasir Dimsum | Lengkap dengan Pengeluaran & QRIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #0f172a 0%, #0b1120 100%);
            font-family: 'Inter', sans-serif;
            color: #eef2ff;
            min-height: 100vh;
            padding: 1rem;
        }
        .container { max-width: 1300px; margin: 0 auto; }

        /* NAVBAR */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            background: rgba(15, 25, 45, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 0.7rem 1.2rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(6, 182, 212, 0.3);
            position: relative;
            z-index: 100;
        }
        .logo {
            font-weight: 700;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #fff, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .global-stock {
            background: #1e293b;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.85rem;
        }
        .global-stock span { font-weight: bold; color: #38bdf8; }
        .global-stock button {
            background: #f59e0b;
            border: none;
            padding: 0.2rem 0.6rem;
            border-radius: 1.5rem;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.75rem;
        }
        .nav-menu {
            display: flex;
            gap: 0.8rem;
        }
        .nav-menu button {
            background: #1e293b;
            border: none;
            border-radius: 2rem;
            padding: 0.5rem 1.2rem;
            color: #eef2ff;
            font-weight: 500;
            cursor: pointer;
        }
        .nav-menu button.active { background: #06b6d4; color: #0f172a; }
        .hamburger {
            background: #1e293b;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #06b6d4;
            padding: 0.3rem 0.7rem;
            border-radius: 1rem;
            display: none;
        }
        @media (max-width: 768px) {
            .hamburger { display: block; }
            .nav-menu {
                position: fixed;
                top: 0;
                left: -100%;
                width: 70%;
                height: 100vh;
                background: #0a0f1c;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 1.5rem;
                transition: left 0.3s;
                z-index: 1000;
                border-right: 2px solid #06b6d4;
            }
            .nav-menu.open { left: 0; }
            .menu-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.75);
                z-index: 999;
                display: none;
            }
            .menu-overlay.active { display: block; }
        }

        /* Panels */
        .panel { display: none; }
        .panel.active-panel { display: block; }
        .card {
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            border: 1px solid rgba(6, 182, 212, 0.3);
            padding: 1.2rem;
            margin-bottom: 1rem;
        }
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
            margin-bottom: 1rem;
        }
        .form-group { flex: 1; min-width: 120px; }
        label { font-size: 0.75rem; color: #94a3b8; display: block; margin-bottom: 4px; }
        input, select, button {
            width: 100%;
            padding: 8px 12px;
            border-radius: 1rem;
            background: #1e293b;
            border: 1px solid #334155;
            color: #eef2ff;
            font-family: inherit;
        }
        button { background: #0d6efd; cursor: pointer; font-weight: 600; }
        .btn-success { background: #10b981; }
        .btn-danger { background: #dc2626; }
        .btn-warning { background: #f59e0b; color: #0f172a; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #334155;
        }
        .total-box {
            background: #0f172a;
            padding: 0.5rem;
            border-radius: 1rem;
            text-align: center;
            font-weight: bold;
            margin-top: 8px;
        }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #0f172a;
            border-radius: 2rem;
            padding: 1.5rem;
            width: 90%;
            max-width: 400px;
            border: 1px solid #06b6d4;
        }
        .close-modal {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: #38bdf8; }
        .receipt {
            font-family: monospace;
            white-space: pre-wrap;
            background: white;
            color: black;
            padding: 1rem;
            border-radius: 1rem;
            margin-top: 1rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .stat-card {
            background: #0f172a;
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            border-left: 4px solid #06b6d4;
        }
        footer { text-align: center; font-size: 0.7rem; color: #5b6e8c; margin-top: 2rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="navbar">
        <div class="logo"><i class="fas fa-utensils"></i> Dimsum Kasir</div>
        <div class="global-stock">
            <i class="fas fa-boxes"></i> Stok: <span id="globalStockValue">0</span> porsi
            <button id="editGlobalStockBtn"><i class="fas fa-edit"></i></button>
            <button id="addGlobalStockBtn"><i class="fas fa-plus"></i></button>
        </div>
        <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
        <div class="nav-menu" id="navMenu">
            <button data-panel="dashboard" class="active"><i class="fas fa-chart-pie"></i> Dashboard</button>
            <button data-panel="kasir"><i class="fas fa-cash-register"></i> Kasir</button>
            <button data-panel="produk"><i class="fas fa-boxes"></i> Produk</button>
            <button data-panel="pengeluaran"><i class="fas fa-money-bill-wave"></i> Pengeluaran</button>
            <button data-panel="laporan"><i class="fas fa-chart-line"></i> Laporan</button>
        </div>
        <div id="menuOverlay" class="menu-overlay"></div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardPanel" class="panel active-panel">
        <div class="card">
            <h3><i class="fas fa-chart-simple"></i> Ringkasan Bisnis</h3>
            <div class="stats-grid" id="statsContainer"></div>
        </div>
    </div>

    <!-- Kasir Panel -->
    <div id="kasirPanel" class="panel">
        <div class="card">
            <h3>Menu Dimsum</h3>
            <div class="flex-row">
                <div class="form-group"><label>Pilih Menu</label><select id="menuSelect"></select></div>
                <div class="form-group"><label>Jumlah</label><input type="number" id="qtyInput" value="1" min="1"></div>
                <div class="form-group"><label>&nbsp;</label><button id="addToCartBtn" class="btn-success"><i class="fas fa-plus"></i> Tambah</button></div>
            </div>
            <div id="cartList" style="max-height: 300px; overflow-y: auto;"></div>
            <div class="total-box">Total: <span id="cartTotal">Rp 0</span></div>
            <div class="flex-row"><button id="clearCartBtn" class="btn-danger"><i class="fas fa-trash"></i> Kosongkan</button>
            <button id="openPaymentBtn" class="btn-success"><i class="fas fa-credit-card"></i> Bayar</button></div>
        </div>
        <div class="card" id="strukArea" style="display:none;">
            <h4>Struk</h4>
            <div id="receiptContent" class="receipt"></div>
            <button id="closeStrukBtn" class="btn-warning">Tutup</button>
        </div>
    </div>

    <!-- Produk Panel -->
    <div id="produkPanel" class="panel">
        <div class="card">
            <h3>Manajemen Produk</h3>
            <div class="flex-row">
                <div class="form-group"><label>Nama</label><input type="text" id="prodName" placeholder="Siomay Ayam"></div>
                <div class="form-group"><label>Harga</label><input type="number" id="prodPrice" placeholder="15000"></div>
                <div class="form-group"><label>Stok</label><input type="number" id="prodStock" placeholder="50"></div>
                <div class="form-group"><label>&nbsp;</label><button id="addProductBtn" class="btn-success">Simpan</button></div>
            </div>
            <div id="productTable"></div>
        </div>
    </div>

    <!-- Pengeluaran Panel -->
    <div id="pengeluaranPanel" class="panel">
        <div class="card">
            <h3>Catat Pengeluaran</h3>
            <div class="flex-row">
                <div class="form-group"><label>Tanggal</label><input type="date" id="expenseDate"></div>
                <div class="form-group"><label>Kategori</label><select id="expenseCategory">
                    <option>Bahan Baku</option><option>Sewa</option><option>Listrik/Air</option><option>Gas</option><option>Gaji</option><option>Lainnya</option>
                </select></div>
                <div class="form-group"><label>Deskripsi</label><input type="text" id="expenseDesc" placeholder="detail"></div>
                <div class="form-group"><label>Jumlah (Rp)</label><input type="number" id="expenseAmount"></div>
                <div class="form-group"><label>&nbsp;</label><button id="addExpenseBtn" class="btn-danger">Catat</button></div>
            </div>
            <div id="expenseList"></div>
        </div>
    </div>

    <!-- Laporan Panel -->
    <div id="laporanPanel" class="panel">
        <div class="card">
            <h3>Laporan Penjualan & Pengeluaran</h3>
            <div class="flex-row">
                <div class="form-group"><label>Dari</label><input type="date" id="reportStart"></div>
                <div class="form-group"><label>Sampai</label><input type="date" id="reportEnd"></div>
                <div class="form-group"><label>&nbsp;</label><button id="filterReportBtn" class="btn-primary">Filter</button></div>
            </div>
            <div id="reportResult"></div>
        </div>
    </div>

    <!-- Modal Pembayaran -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeModalBtn">&times;</span>
            <h3>Pembayaran</h3>
            <div><strong>Total:</strong> <span id="modalTotal">Rp 0</span></div>
            <div style="margin: 0.5rem 0;"><label>Metode</label><select id="paymentMethod"><option value="cash">Cash</option><option value="qris">QRIS</option></select></div>
            <div><label>Jumlah Bayar</label><input type="number" id="modalPayAmount" placeholder="0"></div>
            <div><strong>Kembalian:</strong> <span id="modalChange">Rp 0</span></div>
            <button id="confirmPaymentBtn" class="btn-success" style="margin-top: 1rem;">Konfirmasi</button>
        </div>
    </div>
    <footer>Stok global & pengeluaran mempengaruhi laba bersih.</footer>
</div>

<script>
    // Data
    let products = [
        { id: 1, name: "Siomay Ayam", price: 15000, stock: 50 },
        { id: 2, name: "Hakao Udang", price: 18000, stock: 40 },
        { id: 3, name: "Lumpia Kulit", price: 12000, stock: 30 }
    ];
    let globalStock = 120;
    let transactions = []; // { id, date, items, total, paid, change, method, qtyTotal }
    let expenses = []; // { id, date, category, desc, amount }
    let nextId = { product: 4, transaction: 1, expense: 1 };
    let currentCart = [];

    // DOM
    const globalStockSpan = document.getElementById('globalStockValue');
    const menuSelect = document.getElementById('menuSelect');
    const cartListDiv = document.getElementById('cartList');
    const cartTotalSpan = document.getElementById('cartTotal');
    const productTableDiv = document.getElementById('productTable');
    const expenseListDiv = document.getElementById('expenseList');
    const reportResultDiv = document.getElementById('reportResult');
    const statsContainer = document.getElementById('statsContainer');
    const paymentModal = document.getElementById('paymentModal');
    const modalTotalSpan = document.getElementById('modalTotal');
    const modalPayAmount = document.getElementById('modalPayAmount');
    const modalChangeSpan = document.getElementById('modalChange');
    const paymentMethodSelect = document.getElementById('paymentMethod');
    const openPaymentBtn = document.getElementById('openPaymentBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const confirmPaymentBtn = document.getElementById('confirmPaymentBtn');
    const clearCartBtn = document.getElementById('clearCartBtn');
    const editGlobalStockBtn = document.getElementById('editGlobalStockBtn');
    const addGlobalStockBtn = document.getElementById('addGlobalStockBtn');
    const addExpenseBtn = document.getElementById('addExpenseBtn');
    const filterReportBtn = document.getElementById('filterReportBtn');

    // Helper
    function formatRupiah(num) {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
    }
    function loadData() {
        const stored = localStorage.getItem('dimsum_full');
        if(stored) {
            const data = JSON.parse(stored);
            products = data.products || products;
            globalStock = data.globalStock ?? 120;
            transactions = data.transactions || [];
            expenses = data.expenses || [];
            nextId = data.nextId || { product: 4, transaction: 1, expense: 1 };
        }
        if(!products.length) resetDefault();
        updateUI();
    }
    function saveData() {
        localStorage.setItem('dimsum_full', JSON.stringify({ products, globalStock, transactions, expenses, nextId }));
    }
    function resetDefault() {
        products = [
            { id: 1, name: "Siomay Ayam", price: 15000, stock: 50 },
            { id: 2, name: "Hakao Udang", price: 18000, stock: 40 },
            { id: 3, name: "Lumpia Kulit", price: 12000, stock: 30 }
        ];
        globalStock = 120;
        transactions = [];
        expenses = [];
        nextId = { product: 4, transaction: 1, expense: 1 };
    }
    function updateUI() {
        globalStockSpan.innerText = globalStock;
        renderMenuSelect();
        renderProductTable();
        renderExpenses();
        renderReport();
        updateDashboard();
        updateCartUI();
    }
    function renderMenuSelect() {
        menuSelect.innerHTML = '';
        products.forEach(p => {
            let opt = document.createElement('option');
            opt.value = p.id;
            opt.textContent = `${p.name} - ${formatRupiah(p.price)} (stok:${p.stock})`;
            menuSelect.appendChild(opt);
        });
    }
    function updateCartUI() {
        if(!cartListDiv) return;
        if(currentCart.length === 0) {
            cartListDiv.innerHTML = '<div class="total-box">Keranjang kosong</div>';
            cartTotalSpan.innerText = formatRupiah(0);
            return;
        }
        let html = '', total = 0;
        currentCart.forEach((item, idx) => {
            let sub = item.qty * item.price;
            total += sub;
            html += `<div class="cart-item">
                        <span><strong>${item.name}</strong> x ${item.qty}</span>
                        <span>${formatRupiah(sub)}</span>
                        <button class="remove-cart-item" data-idx="${idx}" style="background:#ef4444; padding:2px 8px;">✖</button>
                    </div>`;
        });
        cartListDiv.innerHTML = html;
        cartTotalSpan.innerText = formatRupiah(total);
        document.querySelectorAll('.remove-cart-item').forEach(btn => btn.addEventListener('click', e => {
            const idx = parseInt(btn.dataset.idx);
            currentCart.splice(idx, 1);
            updateCartUI();
        }));
    }
    // Add to cart
    document.getElementById('addToCartBtn').addEventListener('click', () => {
        const prodId = parseInt(menuSelect.value);
        const prod = products.find(p => p.id === prodId);
        if(!prod) return alert('Produk tidak ditemukan');
        let qty = parseInt(document.getElementById('qtyInput').value);
        if(isNaN(qty) || qty <= 0) qty = 1;
        if(prod.stock < qty) return alert(`Stok ${prod.name} hanya ${prod.stock}`);
        const totalQtyCart = currentCart.reduce((s,i) => s + i.qty, 0);
        if(globalStock < totalQtyCart + qty) return alert(`Stok global tidak cukup! Tersisa ${globalStock} porsi.`);
        const existing = currentCart.find(i => i.productId === prodId);
        if(existing) existing.qty += qty;
        else currentCart.push({ productId: prod.id, name: prod.name, price: prod.price, qty });
        updateCartUI();
        document.getElementById('qtyInput').value = 1;
    });
    clearCartBtn.addEventListener('click', () => { if(confirm('Kosongkan keranjang?')) { currentCart = []; updateCartUI(); } });

    // Payment modal
    openPaymentBtn.addEventListener('click', () => {
        if(currentCart.length === 0) return alert('Keranjang kosong');
        const total = currentCart.reduce((s,i) => s + i.qty * i.price, 0);
        modalTotalSpan.innerText = formatRupiah(total);
        modalPayAmount.value = '';
        modalChangeSpan.innerText = formatRupiah(0);
        paymentModal.style.display = 'flex';
    });
    closeModalBtn.addEventListener('click', () => paymentModal.style.display = 'none');
    window.addEventListener('click', e => { if(e.target === paymentModal) paymentModal.style.display = 'none'; });
    modalPayAmount.addEventListener('input', () => {
        let total = currentCart.reduce((s,i) => s + i.qty * i.price, 0);
        let paid = parseFloat(modalPayAmount.value) || 0;
        let change = paid - total;
        modalChangeSpan.innerText = change >= 0 ? formatRupiah(change) : 'Kurang';
    });
    confirmPaymentBtn.addEventListener('click', () => {
        let total = currentCart.reduce((s,i) => s + i.qty * i.price, 0);
        let paid = parseFloat(modalPayAmount.value) || 0;
        if(paid < total) return alert('Jumlah bayar kurang');
        let totalQty = currentCart.reduce((s,i) => s + i.qty, 0);
        if(globalStock < totalQty) return alert(`Stok global tidak cukup! Tersisa ${globalStock} porsi.`);
        // kurangi stok
        for(let item of currentCart) {
            let prod = products.find(p => p.id === item.productId);
            if(prod) prod.stock -= item.qty;
        }
        globalStock -= totalQty;
        const method = paymentMethodSelect.value;
        const transaction = {
            id: nextId.transaction++,
            date: new Date().toISOString().slice(0,10),
            items: currentCart.map(i => ({ productId: i.productId, name: i.name, qty: i.qty, price: i.price })),
            total, paid, change: paid - total, qtyTotal: totalQty, method
        };
        transactions.push(transaction);
        saveData();
        updateUI();
        // tampilkan struk
        let itemsStr = '';
        transaction.items.forEach(i => itemsStr += `${i.name} x ${i.qty} = ${formatRupiah(i.qty * i.price)}\n`);
        const receiptText = `================================\n      DIMSUM KASIR\n      ${transaction.date}\n================================\n${itemsStr}\n--------------------------------\nTotal:   ${formatRupiah(transaction.total)}\nBayar:   ${formatRupiah(transaction.paid)}\nMetode:  ${transaction.method.toUpperCase()}\nKembali: ${formatRupiah(transaction.change)}\n--------------------------------\nPorsi: ${transaction.qtyTotal}\nStok global sisa: ${globalStock}\n================================\nTerima kasih!`;
        document.getElementById('receiptContent').innerText = receiptText;
        document.getElementById('strukArea').style.display = 'block';
        currentCart = [];
        updateCartUI();
        paymentModal.style.display = 'none';
    });
    document.getElementById('closeStrukBtn').addEventListener('click', () => document.getElementById('strukArea').style.display = 'none');

    // Stok global edit / tambah
    editGlobalStockBtn.addEventListener('click', () => {
        let val = prompt('Masukkan stok global baru (porsi):', globalStock);
        if(val !== null && !isNaN(parseInt(val)) && parseInt(val) >= 0) {
            globalStock = parseInt(val);
            saveData();
            updateUI();
            alert(`Stok global diubah menjadi ${globalStock}`);
        }
    });
    addGlobalStockBtn.addEventListener('click', () => {
        let tambah = prompt('Tambah stok global (porsi):', '50');
        if(tambah && !isNaN(parseInt(tambah)) && parseInt(tambah) > 0) {
            globalStock += parseInt(tambah);
            saveData();
            updateUI();
            alert(`Stok global +${tambah}, sekarang ${globalStock}`);
        }
    });

    // Produk management
    function renderProductTable() {
        let html = `<table><thead><tr><th>Nama</th><th>Harga</th><th>Stok</th><th>Aksi</th></tr></thead><tbody>`;
        products.forEach(p => {
            html += `<tr><td>${p.name}</td><td>${formatRupiah(p.price)}</td><td>${p.stock}</td>
            <td><button class="edit-product" data-id="${p.id}" style="background:#f59e0b;">✏️</button> <button class="delete-product" data-id="${p.id}" style="background:#ef4444;">🗑️</button></td></tr>`;
        });
        html += `</tbody></tr>`;
        productTableDiv.innerHTML = html;
        document.querySelectorAll('.edit-product').forEach(btn => btn.addEventListener('click', () => editProduct(parseInt(btn.dataset.id))));
        document.querySelectorAll('.delete-product').forEach(btn => btn.addEventListener('click', () => { if(confirm('Hapus produk?')) deleteProduct(parseInt(btn.dataset.id)); }));
    }
    function editProduct(id) {
        let prod = products.find(p => p.id === id);
        if(prod) {
            document.getElementById('prodName').value = prod.name;
            document.getElementById('prodPrice').value = prod.price;
            document.getElementById('prodStock').value = prod.stock;
            const saveBtn = document.getElementById('addProductBtn');
            saveBtn.innerHTML = 'Update';
            saveBtn.onclick = () => {
                prod.name = document.getElementById('prodName').value.trim();
                prod.price = parseFloat(document.getElementById('prodPrice').value);
                prod.stock = parseFloat(document.getElementById('prodStock').value);
                if(prod.name && !isNaN(prod.price) && !isNaN(prod.stock)) {
                    saveData();
                    updateUI();
                    saveBtn.innerHTML = 'Simpan';
                    saveBtn.onclick = addProductHandler;
                    document.getElementById('prodName').value = '';
                    document.getElementById('prodPrice').value = '';
                    document.getElementById('prodStock').value = '';
                } else alert('Data tidak valid');
            };
        }
    }
    function deleteProduct(id) { products = products.filter(p => p.id !== id); saveData(); updateUI(); }
    function addProductHandler() {
        let name = document.getElementById('prodName').value.trim();
        let price = parseFloat(document.getElementById('prodPrice').value);
        let stock = parseFloat(document.getElementById('prodStock').value);
        if(!name || isNaN(price) || isNaN(stock)) return alert('Isi semua field');
        products.push({ id: nextId.product++, name, price, stock });
        saveData();
        updateUI();
        document.getElementById('prodName').value = '';
        document.getElementById('prodPrice').value = '';
        document.getElementById('prodStock').value = '';
    }
    document.getElementById('addProductBtn').onclick = addProductHandler;

    // Pengeluaran
    function renderExpenses() {
        let html = `<table><thead><tr><th>Tanggal</th><th>Kategori</th><th>Deskripsi</th><th>Jumlah</th><th>Aksi</th></tr></thead><tbody>`;
        expenses.slice().reverse().forEach(e => {
            html += `<tr><td>${e.date}</td><td>${e.category}</td><td>${e.desc}</td><td>${formatRupiah(e.amount)}</td>
            <td><button class="delete-expense" data-id="${e.id}" style="background:#ef4444;">Hapus</button></td></tr>`;
        });
        html += `</tbody></table>`;
        expenseListDiv.innerHTML = html;
        document.querySelectorAll('.delete-expense').forEach(btn => btn.addEventListener('click', () => {
            if(confirm('Hapus pengeluaran?')) {
                expenses = expenses.filter(e => e.id !== parseInt(btn.dataset.id));
                saveData();
                renderExpenses();
                updateDashboard();
                renderReport();
            }
        }));
    }
    addExpenseBtn.addEventListener('click', () => {
        let date = document.getElementById('expenseDate').value;
        let category = document.getElementById('expenseCategory').value;
        let desc = document.getElementById('expenseDesc').value.trim();
        let amount = parseFloat(document.getElementById('expenseAmount').value);
        if(!date || isNaN(amount) || amount <= 0) return alert('Lengkapi data');
        expenses.push({ id: nextId.expense++, date, category, desc: desc || '-', amount });
        saveData();
        renderExpenses();
        updateDashboard();
        renderReport();
        document.getElementById('expenseDesc').value = '';
        document.getElementById('expenseAmount').value = '';
    });
    document.getElementById('expenseDate').value = new Date().toISOString().slice(0,10);

    // Dashboard stats
    function updateDashboard() {
        let totalOmzet = 0, totalQris = 0, totalPorsi = 0;
        transactions.forEach(t => {
            totalOmzet += t.total;
            if(t.method === 'qris') totalQris += t.total;
            totalPorsi += t.qtyTotal;
        });
        let totalPengeluaran = expenses.reduce((s, e) => s + e.amount, 0);
        let laba = totalOmzet - totalPengeluaran;
        statsContainer.innerHTML = `
            <div class="stat-card"><i class="fas fa-chart-line"></i><h3>${formatRupiah(totalOmzet)}</h3><p>Total Omzet</p></div>
            <div class="stat-card"><i class="fas fa-qrcode"></i><h3>${formatRupiah(totalQris)}</h3><p>Total QRIS</p></div>
            <div class="stat-card"><i class="fas fa-money-bill"></i><h3>${formatRupiah(totalOmzet - totalQris)}</h3><p>Total Cash</p></div>
            <div class="stat-card"><i class="fas fa-donate"></i><h3>${formatRupiah(totalPengeluaran)}</h3><p>Total Pengeluaran</p></div>
            <div class="stat-card"><i class="fas fa-chart-simple"></i><h3>${totalPorsi}</h3><p>Total Porsi Terjual</p></div>
            <div class="stat-card"><i class="fas fa-hand-holding-usd"></i><h3>${formatRupiah(laba)}</h3><p>Laba Bersih</p></div>
        `;
    }

    // Laporan lengkap
    function renderReport() {
        let start = document.getElementById('reportStart').value;
        let end = document.getElementById('reportEnd').value;
        let filteredTrans = [...transactions];
        let filteredExp = [...expenses];
        if(start && end) {
            filteredTrans = filteredTrans.filter(t => t.date >= start && t.date <= end);
            filteredExp = filteredExp.filter(e => e.date >= start && e.date <= end);
        } else if(start) {
            filteredTrans = filteredTrans.filter(t => t.date >= start);
            filteredExp = filteredExp.filter(e => e.date >= start);
        } else if(end) {
            filteredTrans = filteredTrans.filter(t => t.date <= end);
            filteredExp = filteredExp.filter(e => e.date <= end);
        }
        let totalOmzet = filteredTrans.reduce((s,t) => s + t.total, 0);
        let totalPorsi = filteredTrans.reduce((s,t) => s + t.qtyTotal, 0);
        let totalQris = filteredTrans.filter(t => t.method === 'qris').reduce((s,t) => s + t.total, 0);
        let totalCash = totalOmzet - totalQris;
        let totalPengeluaran = filteredExp.reduce((s,e) => s + e.amount, 0);
        let laba = totalOmzet - totalPengeluaran;
        let html = `<div class="card"><strong>Periode:</strong> ${start || 'awal'} - ${end || 'sekarang'}<br>
        <strong>Omzet:</strong> ${formatRupiah(totalOmzet)} &nbsp;|&nbsp; <strong>QRIS:</strong> ${formatRupiah(totalQris)} &nbsp;|&nbsp; <strong>Cash:</strong> ${formatRupiah(totalCash)}<br>
        <strong>Pengeluaran:</strong> ${formatRupiah(totalPengeluaran)} &nbsp;|&nbsp; <strong>Laba:</strong> ${formatRupiah(laba)}<br>
        <strong>Total Porsi Terjual:</strong> ${totalPorsi}</div>`;
        html += `<h4>📜 Rincian Transaksi</h4><table><thead><tr><th>Tanggal</th><th>Item</th><th>Total</th><th>Metode</th></tr></thead><tbody>`;
        filteredTrans.slice().reverse().forEach(t => {
            let itemsDetail = t.items.map(i => `${i.name} x${i.qty}`).join(', ');
            html += `<tr><td>${t.date}</td><td>${itemsDetail}</td><td>${formatRupiah(t.total)}</td><td>${t.method.toUpperCase()}</td></tr>`;
        });
        html += `</tbody></table><h4>📋 Pengeluaran</h4><table><thead><tr><th>Tanggal</th><th>Kategori</th><th>Deskripsi</th><th>Jumlah</th></tr></thead><tbody>`;
        filteredExp.slice().reverse().forEach(e => {
            html += `<tr><td>${e.date}</td><td>${e.category}</td><td>${e.desc}</td><td>${formatRupiah(e.amount)}</td></tr>`;
        });
        html += `</tbody></table>`;
        reportResultDiv.innerHTML = html;
    }
    filterReportBtn.addEventListener('click', renderReport);

    // Navigation & Hamburger
    const panels = {
        dashboard: document.getElementById('dashboardPanel'),
        kasir: document.getElementById('kasirPanel'),
        produk: document.getElementById('produkPanel'),
        pengeluaran: document.getElementById('pengeluaranPanel'),
        laporan: document.getElementById('laporanPanel')
    };
    const navBtns = document.querySelectorAll('[data-panel]');
    const navMenu = document.getElementById('navMenu');
    const hamburger = document.getElementById('hamburgerBtn');
    const overlay = document.getElementById('menuOverlay');
    function switchPanel(panelName) {
        Object.values(panels).forEach(p => p.classList.remove('active-panel'));
        panels[panelName].classList.add('active-panel');
        navBtns.forEach(btn => btn.classList.remove('active'));
        document.querySelector(`[data-panel="${panelName}"]`).classList.add('active');
        if(panelName === 'produk') renderProductTable();
        if(panelName === 'pengeluaran') renderExpenses();
        if(panelName === 'laporan') renderReport();
        if(panelName === 'dashboard') updateDashboard();
        if(panelName === 'kasir') updateCartUI();
        navMenu.classList.remove('open');
        overlay.classList.remove('active');
    }
    navBtns.forEach(btn => btn.addEventListener('click', () => switchPanel(btn.dataset.panel)));
    hamburger.addEventListener('click', () => { navMenu.classList.toggle('open'); overlay.classList.toggle('active'); });
    overlay.addEventListener('click', () => { navMenu.classList.remove('open'); overlay.classList.remove('active'); });

    // Set default dates
    const today = new Date().toISOString().slice(0,10);
    document.getElementById('reportStart').value = new Date(Date.now() - 30*86400000).toISOString().slice(0,10);
    document.getElementById('reportEnd').value = today;
    loadData();
</script>
</body>
</html>
