<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Kunci Jawaban TOEIC & TOEFL 100 Soal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(145deg, #0f172a 0%, #1e1b2e 100%);
      font-family: 'Inter', sans-serif;
      color: #eef2ff;
      padding: 1rem;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    .card {
      background: rgba(15, 25, 45, 0.75);
      backdrop-filter: blur(10px);
      border-radius: 1.5rem;
      border: 1px solid rgba(6, 182, 212, 0.3);
      padding: 1.2rem;
      margin-bottom: 1.5rem;
    }
    h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, #fff, #38bdf8); -webkit-background-clip: text; background-clip: text; color: transparent; text-align: center; }
    .sub { text-align: center; color: #94a3b8; margin-bottom: 1rem; }
    .test-selector { display: flex; gap: 1rem; justify-content: center; margin-bottom: 1rem; }
    .test-btn {
      background: #1e293b; border: 1px solid #334155; border-radius: 40px; padding: 0.5rem 1.2rem;
      cursor: pointer; font-weight: 600; transition: 0.2s;
    }
    .test-btn.active { background: #06b6d4; color: #0f172a; border-color: #06b6d4; }
    .answer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 0.6rem; margin-top: 1rem; }
    .answer-item {
      background: #1e293b; padding: 0.5rem; border-radius: 0.5rem; text-align: center;
      border-left: 3px solid #06b6d4; font-weight: 500;
    }
    footer { text-align: center; font-size: 0.7rem; color: #5b6e8c; margin-top: 2rem; }
    @media (max-width: 700px) {
      .answer-grid { grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1><i class="fas fa-key"></i> Kunci Jawaban</h1>
    <div class="sub">Pilih tes untuk melihat jawaban benar (format huruf A/B/C/D)</div>

    <div class="test-selector">
      <div class="test-btn active" data-test="toeic">📘 TOEIC (100 Soal)</div>
      <div class="test-btn" data-test="toefl">🌍 TOEFL (100 Soal)</div>
    </div>

    <div id="answerKeyContainer" class="answer-grid">Memuat...</div>
  </div>
  <footer>Kunci jawaban untuk simulasi TOEIC/TOEFL 100 soal. Dibuka di jendela terpisah.</footer>
</div>

<script>
  // ==================== PEMBANGKIT KUNCI JAWABAN ====================
  function generateToeicAnswers(count) {
    const templates = [
      { correct: 0, letter: "A" }, { correct: 0, letter: "A" }, { correct: 0, letter: "A" }, { correct: 0, letter: "A" },
      { correct: 0, letter: "A" }, { correct: 2, letter: "C" }, { correct: 0, letter: "A" }, { correct: 0, letter: "A" },
      { correct: 2, letter: "C" }, { correct: 1, letter: "B" }
    ];
    let answers = [];
    for (let i = 0; i < count; i++) {
      answers.push(templates[i % templates.length].letter);
    }
    return answers;
  }

  function generateToeflAnswers(count) {
    const templates = [
      { correct: 0, letter: "A" }, { correct: 1, letter: "B" }, { correct: 1, letter: "B" }, { correct: 1, letter: "B" },
      { correct: 1, letter: "B" }, { correct: 1, letter: "B" }, { correct: 0, letter: "A" }, { correct: 0, letter: "A" },
      { correct: 1, letter: "B" }, { correct: 1, letter: "B" }
    ];
    let answers = [];
    for (let i = 0; i < count; i++) {
      answers.push(templates[i % templates.length].letter);
    }
    return answers;
  }

  let toeicAnswers = generateToeicAnswers(100);
  let toeflAnswers = generateToeflAnswers(100);
  let currentTest = "toeic";

  function renderAnswers() {
    const container = document.getElementById("answerKeyContainer");
    const answers = currentTest === "toeic" ? toeicAnswers : toeflAnswers;
    let html = "";
    for (let i = 0; i < answers.length; i++) {
      html += `<div class="answer-item">${i+1}. ${answers[i]}</div>`;
    }
    container.innerHTML = html;
  }

  document.querySelectorAll('.test-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.test-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTest = btn.dataset.test;
      renderAnswers();
    });
  });

  renderAnswers();
</script>
</body>
</html>
