<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Kuis Tebak Karakter</title>
    <style>
        /* ============ STYLE KEREN ============ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Courier New', monospace;
            background: linear-gradient(135deg, #0b0e14 0%, #1a1f2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #b0c7d9;
        }

        .container {
            max-width: 650px;
            width: 100%;
            background: rgba(20, 26, 34, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #2a3a4a;
            border-radius: 24px;
            padding: 35px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), 0 0 40px rgba(0, 255, 170, 0.05);
            transition: all 0.3s;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            text-align: center;
            color: #00ffaa;
            text-shadow: 0 0 20px rgba(0, 255, 170, 0.2);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: #7a8a9a;
            margin-bottom: 30px;
            border-bottom: 1px solid #1a232c;
            padding-bottom: 15px;
        }

        .question-container {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .question-container.active {
            display: block;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #d0e0ee;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-btn {
            background: #1e2730;
            border: 2px solid #2a3a4a;
            border-radius: 14px;
            padding: 14px 22px;
            color: #b0c7d9;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s;
            flex: 1 0 auto;
            text-align: center;
            font-family: inherit;
        }

        .option-btn:hover {
            background: #2a3a4a;
            border-color: #00ffaa;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 255, 170, 0.1);
        }

        .option-btn.selected {
            background: #00ffaa;
            color: #0b0e14;
            border-color: #00ffaa;
            box-shadow: 0 0 30px rgba(0, 255, 170, 0.2);
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid #2a3a4a;
            color: #7a8a9a;
            padding: 10px 24px;
            border-radius: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .nav-btn:hover:not(:disabled) {
            background: #2a3a4a;
            color: #b0c7d9;
            border-color: #00ffaa;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .nav-btn.primary {
            background: #00ffaa;
            color: #0b0e14;
            border: none;
            font-weight: bold;
        }

        .nav-btn.primary:hover:not(:disabled) {
            background: #00cc88;
            box-shadow: 0 0 30px rgba(0, 255, 170, 0.2);
        }

        /* Result */
        #result-container {
            display: none;
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        #result-container.active {
            display: block;
        }

        .character-card {
            background: #0f161e;
            border: 2px solid #2a3a4a;
            border-radius: 20px;
            padding: 30px 20px;
            margin: 20px 0;
        }

        .character-emoji {
            font-size: 5rem;
            margin-bottom: 10px;
        }

        .character-name {
            font-size: 2rem;
            font-weight: 700;
            color: #00ffaa;
            margin-bottom: 8px;
        }

        .character-desc {
            color: #b0c7d9;
            font-size: 1rem;
            line-height: 1.6;
        }

        .restart-btn {
            background: #00ffaa;
            color: #0b0e14;
            border: none;
            padding: 14px 40px;
            border-radius: 14px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            margin-top: 15px;
        }

        .restart-btn:hover {
            background: #00cc88;
            transform: scale(1.03);
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #1a232c;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #00ffaa;
            width: 0%;
            transition: width 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #2a3a4a;
            margin-top: 25px;
            border-top: 1px solid #1a232c;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 TEBAK KARAKTER</h1>
    <div class="subtitle">Berdasarkan Warna Kesukaan &amp; Suka Mawar</div>

    <!-- Progress -->
    <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
    </div>

    <!-- Container pertanyaan -->
    <div id="questions-wrapper">
        <!-- Pertanyaan akan di-render oleh JS -->
    </div>

    <!-- Hasil -->
    <div id="result-container">
        <div class="character-card">
            <div class="character-emoji" id="result-emoji">🤖</div>
            <div class="character-name" id="result-name">Karakter</div>
            <div class="character-desc" id="result-desc">Deskripsi</div>
        </div>
        <button class="restart-btn" onclick="restartQuiz()">🔄 Ulang Kuis</button>
    </div>

    <footer>
        ZinXploit-GPT &copy; 2026 — Kuis Tanpa Batas
    </footer>
</div>

<script>
    // ============= DATA KARAKTER =============
    const characters = [
        {
            id: 'luffy',
            name: 'Monkey D. Luffy',
            emoji: '🏴‍☠️',
            desc: 'Kapten Bajak Laut Topi Jerami, penggemar daging, petualang sejati. Warna favorit: MERAH, suka mawar? TIDAK (lebih suka daging).',
            color: 'merah',
            likesRose: false
        },
        {
            id: 'naruto',
            name: 'Naruto Uzumaki',
            emoji: '🍜',
            desc: 'Hokage ke-7, ninja hiperaktif yang suka ramen. Warna favorit: ORANYE, suka mawar? TIDAK (lebih suka ramen).',
            color: 'oranye',
            likesRose: false
        },
        {
            id: 'sasuke',
            name: 'Sasuke Uchiha',
            emoji: '⚡',
            desc: 'Ninja kelam dari klan Uchiha, pendiam dan misterius. Warna favorit: BIRU, suka mawar? TIDAK (lebih suka kesendirian).',
            color: 'biru',
            likesRose: false
        },
        {
            id: 'sailor',
            name: 'Sailor Moon',
            emoji: '🌙',
            desc: 'Pahlawan cewek yang melindungi bulan, suka romansa dan bunga. Warna favorit: PINK, suka mawar? YA (suka bunga mawar).',
            color: 'pink',
            likesRose: true
        },
        {
            id: 'zoro',
            name: 'Roronoa Zoro',
            emoji: '⚔️',
            desc: 'Pendekar pedang tiga jurus, senang latihan dan tidur. Warna favorit: HIJAU, suka mawar? TIDAK (lebih suka sake).',
            color: 'hijau',
            likesRose: false
        },
        {
            id: 'sakura',
            name: 'Sakura Haruno',
            emoji: '🌸',
            desc: 'Ninja medis, kuat dan penyayang, suka hal-hal cantik. Warna favorit: PINK, suka mawar? YA (suka bunga).',
            color: 'pink',
            likesRose: true
        }
    ];

    // ============= DATA KUIS =============
    const questions = [
        {
            id: 'color',
            text: '🌺 Warna apa yang paling kamu suka?',
            options: ['Merah', 'Oranye', 'Biru', 'Pink', 'Hijau', 'Kuning'],
            type: 'single'
        },
        {
            id: 'rose',
            text: '🌹 Apakah kamu suka mawar? (bunga)',
            options: ['Ya, suka sekali', 'Tidak, kurang suka'],
            type: 'single'
        }
    ];

    let currentQuestion = 0;
    let answers = {};

    // ============= RENDER PERTANYAAN =============
    function renderQuestion(index) {
        const wrapper = document.getElementById('questions-wrapper');
        const q = questions[index];
        if (!q) {
            // Selesai -> tampilkan hasil
            showResult();
            return;
        }

        // Update progress
        const progress = ((index) / questions.length) * 100;
        document.getElementById('progress-fill').style.width = progress + '%';

        let html = `<div class="question-container active">`;
        html += `<div class="question-text">${q.text}</div>`;
        html += `<div class="options" id="options-${q.id}">`;

        q.options.forEach(opt => {
            const isSelected = (answers[q.id] === opt);
            html += `<button class="option-btn ${isSelected ? 'selected' : ''}" data-value="${opt}" onclick="selectOption('${q.id}', '${opt}')">${opt}</button>`;
        });

        html += `</div>`;
        html += `<div class="nav-buttons">`;
        html += `<button class="nav-btn" ${index === 0 ? 'disabled' : ''} onclick="prevQuestion()">⬅ Kembali</button>`;
        html += `<button class="nav-btn primary" onclick="nextQuestion()">${index === questions.length - 1 ? '🎯 Lihat Hasil' : 'Lanjut ➡'}</button>`;
        html += `</div></div>`;

        wrapper.innerHTML = html;
        // Sembunyikan result
        document.getElementById('result-container').classList.remove('active');
    }

    // ============= PILIH OPSI =============
    function selectOption(questionId, value) {
        answers[questionId] = value;
        // Update tampilan tombol
        const container = document.getElementById(`options-${questionId}`);
        if (container) {
            const btns = container.querySelectorAll('.option-btn');
            btns.forEach(btn => {
                btn.classList.toggle('selected', btn.dataset.value === value);
            });
        }
    }

    // ============= NAVIGASI =============
    function nextQuestion() {
        const q = questions[currentQuestion];
        if (!answers[q.id]) {
            alert('Pilih salah satu dulu, bego!');
            return;
        }
        currentQuestion++;
        if (currentQuestion >= questions.length) {
            showResult();
        } else {
            renderQuestion(currentQuestion);
        }
    }

    function prevQuestion() {
        if (currentQuestion > 0) {
            currentQuestion--;
            renderQuestion(currentQuestion);
        }
    }

    // ============= HASIL =============
    function showResult() {
        // Sembunyikan pertanyaan
        document.getElementById('questions-wrapper').innerHTML = '';
        document.getElementById('progress-fill').style.width = '100%';

        // Cari karakter terbaik
        const colorMap = {
            'merah': 'merah',
            'oranye': 'oranye',
            'biru': 'biru',
            'pink': 'pink',
            'hijau': 'hijau',
            'kuning': 'kuning'
        };
        const userColor = answers.color ? answers.color.toLowerCase() : '';
        const userRose = answers.rose ? answers.rose.toLowerCase().includes('ya') : false;

        // Cari karakter dengan warna cocok dan preferensi mawar cocok
        let matched = characters.filter(c => c.color === userColor && c.likesRose === userRose);
        if (matched.length === 0) {
            // Coba hanya warna
            matched = characters.filter(c => c.color === userColor);
        }
        if (matched.length === 0) {
            // Coba hanya mawar
            matched = characters.filter(c => c.likesRose === userRose);
        }
        if (matched.length === 0) {
            matched = [characters[0]]; // default
        }

        // Ambil yang pertama
        const result = matched[0];

        // Tampilkan
        document.getElementById('result-emoji').textContent = result.emoji;
        document.getElementById('result-name').textContent = result.name;
        document.getElementById('result-desc').textContent = result.desc;
        document.getElementById('result-container').classList.add('active');
    }

    // ============= RESTART =============
    function restartQuiz() {
        currentQuestion = 0;
        answers = {};
        document.getElementById('result-container').classList.remove('active');
        renderQuestion(0);
    }

    // ============= START =============
    window.onload = function() {
        renderQuestion(0);
    };
</script>

</body>
</html>
